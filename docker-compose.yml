version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: fx_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    container_name: fx_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  fx-trading-app:
    build: .
    container_name: fx_trading_app
    env_file:
      - .env
    ports:
      - "6050:6050"
    depends_on:
      - postgres
      - redis
    command: pnpm run start:prod

volumes:
  postgres_data:
  redis_data:
